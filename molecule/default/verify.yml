- name: Verify JBoss Deployment
  hosts: fedora-chocolate-smelt-74
  tasks:
    - name: Check if JBoss service is running
      ansible.builtin.systemd:
        name: jboss-eap
        state: started
      check_mode: yes
      register: service_status
      failed_when: service_status.changed

    - name: Wait for JBoss to listen on port 8080
      ansible.builtin.wait_for:
        port: 8080
        timeout: 60

    - name: Verify application "crash.war" is accessible
      ansible.builtin.uri:
        url: "http://localhost:8080/crash"
        status_code: 200
      register: app_check
      retries: 5
      delay: 10
      until: app_check.status == 200